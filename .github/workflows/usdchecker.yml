#
# Phase 1 CI gate: validate that every fixture .usda passes usdchecker
# (USD syntax + composition) and that the V-Sekai codeless schema plugin
# loads cleanly (HasAPI / attribute round-trip via scripts/check_schemas.py).
#
# This runs on every push and PR. Round-trip diff against idtx-flow's
# import/export is added later (Phase 4, post-CHI-252).

name: usdchecker

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install USD Python bindings + test deps
        run: |
          pip install --upgrade pip
          pip install "usd-core>=24.05" "numpy>=1.26" "hypothesis>=6.100" pytest

      - name: Run usdchecker on every fixture
        env:
          PXR_PLUGINPATH_NAME: ${{ github.workspace }}/schema
        run: |
          set -euo pipefail
          shopt -s nullglob
          fixtures=(tests/fixtures/*.usda)
          if [ ${#fixtures[@]} -eq 0 ]; then
            echo "No fixtures under tests/fixtures/; nothing to check."
            exit 1
          fi
          for f in "${fixtures[@]}"; do
            echo "==> usdchecker --arkit=false $f"
            usdchecker --arkit=false "$f"
          done

      - name: Verify codeless plugin loads + attributes round-trip
        env:
          PXR_PLUGINPATH_NAME: ${{ github.workspace }}/schema
        run: python scripts/check_schemas.py

      - name: JFA outline reference + property tests (CHI-255)
        run: pytest tests/slang_validate/test_outline_jfa.py -v

      - name: Round-trip diff (hook must not mutate pre-applied fixtures)
        env:
          PXR_PLUGINPATH_NAME: ${{ github.workspace }}/schema
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p .roundtrip
          for f in tests/fixtures/*.usda; do
            name=$(basename "$f" .usda)
            cp "$f" ".roundtrip/${name}.in.usda"
            usdcat --flatten ".roundtrip/${name}.in.usda" \
              > ".roundtrip/${name}.before.flat.usda"
            python blender/post_export_hook.py \
              --in ".roundtrip/${name}.in.usda"
            usdcat --flatten ".roundtrip/${name}.in.usda" \
              > ".roundtrip/${name}.after.flat.usda"
            diff -u ".roundtrip/${name}.before.flat.usda" \
                    ".roundtrip/${name}.after.flat.usda"
          done

  blender-hook-import:
    # Smoke-checks that the post-export hook imports cleanly under the
    # same pxr build CI uses. Does not exercise Blender itself yet —
    # that gets a separate job once Phase 1 freezes a Blender pin.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install USD Python bindings
        run: |
          pip install --upgrade pip
          pip install "usd-core>=24.05"

      - name: Import blender/post_export_hook.py
        run: python -c "import importlib.util, pathlib; \
          spec = importlib.util.spec_from_file_location('h', \
          'blender/post_export_hook.py'); \
          m = importlib.util.module_from_spec(spec); spec.loader.exec_module(m); \
          print('hook module imported OK; entry point:', m.apply_v_sekai_schemas)"
