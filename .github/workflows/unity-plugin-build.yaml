name: Unity Plugin Build

# Builds the IdtxCore Unity native plugin (idtx_core + the OpenUSD extension +
# every runtime companion + the usd~ plugin registry) via the `unity_plugin`
# scons alias, then runs the completeness guard that fails the build if any
# companion is missing — the regression that silently broke USD/USDZ export.

on:
  workflow_call:

jobs:
  build:
    name: Build Unity plugin on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 (glibc 2.35) for the Linux build: older glibc than the
        # runner default, so the .so runs on Steam Deck / SteamOS (newer glibc)
        # by forward compatibility. Steam Deck is x86_64 Linux — the same plugin.
        os: ["windows-latest", "macos-latest", "ubuntu-22.04"]

    steps:
      - name: Checkout source
        #v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        #v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'

      - name: Install SCons
        run: pip install scons jinja2 pyside6

      - name: Restore openUSD cache
        #v5.0.4
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            thirdparty/openusd-25.11*
          key: ${{ matrix.os }}-openusd-v25.11

      - name: Build Unity plugin (idtx_core + USD extension + companions)
        working-directory: .
        run: scons unity_plugin target=template_release
        shell: bash

      - name: Verify plugin completeness (companion DLLs + USD registry)
        working-directory: .
        run: |
          case "$RUNNER_OS" in
            Windows) PLAT=windows ;;
            macOS)   PLAT=macos ;;
            *)       PLAT=linux ;;
          esac
          python ci/verify_unity_plugin.py --platform "$PLAT"
        shell: bash

      - name: Save openUSD to cache
        #v5.0.4
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            thirdparty/openusd-25.11*
          key: ${{ matrix.os }}-openusd-v25.11

      - name: Package Unity plugin (macOS / Linux)
        if: runner.os == 'macOS' || runner.os == 'Linux'
        working-directory: .
        shell: bash
        run: |
          cd unity && zip -r ../com.vsekai.idtxcore-${{ runner.os }}.zip IdtxCore

      - name: Package Unity plugin (Windows)
        if: runner.os == 'Windows'
        working-directory: .
        shell: pwsh
        run: |
          Compress-Archive -Path unity\IdtxCore -DestinationPath com.vsekai.idtxcore-${{ runner.os }}.zip

      - name: Upload Unity plugin artifact
        #v7.0.0
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: unity-plugin-${{ runner.os }}
          path: ./com.vsekai.idtxcore-${{ runner.os }}.zip
